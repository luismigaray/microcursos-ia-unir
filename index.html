/* ── hook: viewport width ─────────────────────────── */
function useWidth(){
  const [w,setW]=useState(typeof window!=='undefined'?window.innerWidth:1200);
  useEffect(()=>{
    const fn=()=>setW(window.innerWidth);
    window.addEventListener('resize',fn);
    return()=>window.removeEventListener('resize',fn);
  },[]);
  return w;
}

              {[['#microcursos','Microcursos'],['#plan','Plan de estudios'],['#metodologia','Metodología']].map(([h,l])=>(
                <a key={h} href={h} style={{color:scrolled?C.muted:'rgba(255,255,255,0.78)',
                  textDecoration:'none',fontSize:'0.86rem',fontWeight:600}}>{l}</a>
              ))}
              <a href="mailto:informacion@esit.es" style={{background:C.red,color:'#fff',
                padding:'9px 18px',borderRadius:4,textDecoration:'none',
                fontSize:'0.84rem',fontWeight:700}}>Solicitar información</a>
            </div>
          )}
          {/* Mobile hamburger */}
          {isMobile&&(
            <button onClick={()=>setMobileMenuOpen(o=>!o)} style={{background:'none',border:'none',
              cursor:'pointer',padding:6,display:'flex',flexDirection:'column',gap:5}}>
              {[0,1,2].map(i=>(
                <span key={i} style={{width:22,height:2,background:scrolled?C.navy:'#fff',
                  display:'block',borderRadius:2,
                  transform:mobileMenuOpen&&i===0?'rotate(45deg) translate(5px,5px)':
                            mobileMenuOpen&&i===1?'scaleX(0)':
                            mobileMenuOpen&&i===2?'rotate(-45deg) translate(5px,-5px)':'none',
                  transition:'transform 0.2s,opacity 0.2s',
                  opacity:mobileMenuOpen&&i===1?0:1}}/>
              ))}
            </button>
          )}
        </div>
        {/* Mobile dropdown */}
        {isMobile&&mobileMenuOpen&&(
          <div style={{background:C.navy,padding:'1rem',borderTop:'1px solid rgba(255,255,255,0.1)',
            animation:'fadeIn 0.18s ease'}}>
            {[['#microcursos','Microcursos'],['#plan','Plan de estudios'],['#metodologia','Metodología']].map(([h,l])=>(
              <a key={h} href={h} onClick={()=>setMobileMenuOpen(false)}
                style={{display:'block',color:'rgba(255,255,255,0.85)',textDecoration:'none',
                  padding:'11px 0',fontSize:'0.93rem',fontWeight:600,
                  borderBottom:'1px solid rgba(255,255,255,0.08)'}}>{l}</a>
            ))}
            <a href="mailto:informacion@esit.es" style={{display:'block',background:C.red,
              color:'#fff',padding:'12px',borderRadius:5,textDecoration:'none',
              fontSize:'0.9rem',fontWeight:700,textAlign:'center',marginTop:12}}>Solicitar información</a>
          </div>
        )}
      </nav>

      {/* ── HERO ── */}
      <section style={{background:`linear-gradient(120deg,${C.navy} 0%,${C.navyMid} 55%,${C.navyLight} 100%)`,
        padding:isMobile?'48px 1rem 36px':'72px 2rem 60px',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',inset:0,backgroundImage:`linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px)`,backgroundSize:'48px 48px'}}/>
        <div style={{position:'absolute',top:0,left:0,right:0,height:4,
          background:`linear-gradient(90deg,${C.orange},${C.red})`}}/>
        <div style={{maxWidth:1200,margin:'0 auto',position:'relative',
          display:'grid',gridTemplateColumns:isTablet?'1fr':'1fr 400px',gap:'3rem',alignItems:'center'}}>
          <div style={{animation:'fadeUp 0.55s ease both'}}>
            <div style={{display:'inline-flex',alignItems:'center',gap:7,
              background:'rgba(245,130,13,0.15)',border:`1px solid rgba(245,130,13,0.3)`,
              borderRadius:20,padding:'4px 12px',fontSize:'0.72rem',letterSpacing:'0.07em',
              textTransform:'uppercase',color:C.orange,marginBottom:'1rem',fontWeight:700}}>
              Formación Permanente · ESIT
            </div>
            <h1 style={{fontFamily:'Merriweather,serif',
              fontSize:isMobile?'1.75rem':'clamp(1.9rem,3.8vw,2.7rem)',
              fontWeight:900,color:'#fff',lineHeight:1.2,marginBottom:'1rem'}}>
              Microcursos de <span style={{color:C.orange}}>Inteligencia Artificial</span> Aplicada
            </h1>
            <p style={{fontSize:isMobile?'0.93rem':'1rem',color:'rgba(255,255,255,0.75)',
              lineHeight:1.75,marginBottom:'1.5rem',fontWeight:300,maxWidth:560}}>
              Una familia de microcursos diseñada para profesionales de cualquier sector. Introducción rigurosa a la IA con aplicación directa al ámbito profesional. Sin requisitos técnicos previos.
            </p>
            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:'1.5rem'}}>
              {(isMobile
                ?['1–1,5 ECTS','100% online','Sin requisitos']
                :['1–1,5 ECTS por microcurso','Orientación aplicada','100% online','Sin conocimientos técnicos','Puerta al Máster']
              ).map(b=>(
                <span key={b} style={{background:'rgba(255,255,255,0.08)',
                  border:'1px solid rgba(255,255,255,0.16)',borderRadius:4,
                  padding:'4px 11px',fontSize:'0.78rem',color:'rgba(255,255,255,0.88)'}}>{b}</span>
              ))}
            </div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
              <a href="#microcursos" style={{background:C.red,color:'#fff',
                padding:isMobile?'11px 20px':'13px 26px',borderRadius:5,
                textDecoration:'none',fontWeight:700,fontSize:'0.9rem'}}>Ver microcursos</a>
              <a href="#plan" style={{border:'2px solid rgba(255,255,255,0.28)',color:'#fff',
                padding:isMobile?'11px 20px':'13px 26px',borderRadius:5,
                textDecoration:'none',fontWeight:600,fontSize:'0.9rem'}}>Plan de estudios</a>
            </div>
          </div>
          {/* Panel temario – hidden on mobile */}
          {!isTablet&&(
            <div style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',
              borderRadius:12,overflow:'hidden',animation:'fadeUp 0.55s ease 0.15s both'}}>
              <div style={{background:'rgba(245,130,13,0.12)',borderBottom:'1px solid rgba(245,130,13,0.22)',
                padding:'12px 18px'}}>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.08em',
                  textTransform:'uppercase',color:C.orange}}>Arquitectura del temario</div>
              </div>
              {[{n:1,t:'Fundamentos de IA y su impacto profesional',common:true},
                {n:2,t:'Funcionamiento de la IA: ML, redes neuronales e IA generativa',common:true},
                {n:3,t:'Aplicaciones actuales de la IA en [sector]',common:false},
                {n:4,t:'Casos de uso prácticos de la IA en [sector]',common:false},
              ].map((t,i)=>(
                <div key={t.n} style={{display:'flex',gap:13,alignItems:'flex-start',padding:'13px 18px',
                  borderBottom:i<3?'1px solid rgba(255,255,255,0.07)':'none'}}>
                  <div style={{width:27,height:27,borderRadius:'50%',display:'flex',
                    alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,
                    flexShrink:0,marginTop:1,fontFamily:'Merriweather,serif',
                    background:t.common?'rgba(245,130,13,0.2)':'rgba(200,16,46,0.2)',
                    color:t.common?C.orange:'#f48a9b',
                    border:`1px solid ${t.common?'rgba(245,130,13,0.4)':'rgba(200,16,46,0.35)'}`}}>{t.n}</div>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:'rgba(255,255,255,0.9)',lineHeight:1.35,marginBottom:2}}>{t.t}</div>
                    <div style={{fontSize:11,color:'rgba(255,255,255,0.43)'}}>{t.common?'Común a todos los cursos':'Específico por sector'}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </section>

      {/* ── STATS BAR ── */}
      <div style={{background:C.orange}}>
        <div style={{maxWidth:1200,margin:'0 auto',padding:`14px ${px}`,
          display:'flex',gap:isMobile?'1.2rem':'2.5rem',
          justifyContent:'center',flexWrap:'wrap'}}>
          {[['12','Microcursos'],['4','Ámbitos'],['2','Temas comunes'],['100%','Online']].map(([n,l])=>(
            <div key={l} style={{textAlign:'center'}}>
              <div style={{fontFamily:'Merriweather,serif',fontSize:isMobile?20:24,
                fontWeight:900,color:'#fff',lineHeight:1}}>{n}</div>
              <div style={{fontSize:isMobile?10:11,color:'rgba(255,255,255,0.85)',
                fontWeight:600,marginTop:2}}>{l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* ── CATÁLOGO ── */}
      <section id="microcursos" style={{background:'#f4f5f7',padding:`52px ${px}`}}>
        <div style={{maxWidth:1200,margin:'0 auto'}}>
          <SH eyebrow="Catálogo" title="Elige tu especialización"
            sub="12 microcursos en 4 ámbitos profesionales. Toca cualquier curso para ver su programa completo."/>
          {/* Filter pills – horizontal scroll on mobile */}
          <div style={{display:'flex',gap:7,flexWrap:isMobile?'nowrap':'wrap',
            marginBottom:'2rem',overflowX:isMobile?'auto':'visible',
            paddingBottom:isMobile?4:0,WebkitOverflowScrolling:'touch'}}>
            {FILTERS.map(f=>(
              <button key={f.k} onClick={()=>setFilter(f.k)} style={{
                padding:'7px 16px',borderRadius:20,flexShrink:0,
                border:`1.5px solid ${filter===f.k?C.navy:C.border}`,
                background:filter===f.k?C.navy:'#fff',
                color:filter===f.k?'#fff':C.muted,
                fontSize:'0.82rem',fontWeight:600,cursor:'pointer',
                fontFamily:'Open Sans,sans-serif',transition:'all 0.16s',
                whiteSpace:'nowrap',
              }}>{f.l}</button>
            ))}
          </div>
          <div style={{display:'grid',
            gridTemplateColumns:isMobile?'1fr':isTablet?'1fr 1fr':'repeat(3,1fr)',
            gap:'1rem'}}>
            {visible.map((c,i)=><CourseCard key={c.id} course={c} onOpen={setModal} index={i}/>)}
          </div>
        </div>
      </section>

      {/* ── PLAN ── */}
      <section id="plan" style={{background:'#fff',padding:`52px ${px}`}}>
        <div style={{maxWidth:1200,margin:'0 auto'}}>
          <SH eyebrow="Plan de estudios" title="Arquitectura común del temario"
            sub="Los temas 1 y 2 son la base común. Los temas 3 y 4 se adaptan a cada sector. Toca cada tema para ver su detalle."/>
          <div style={{display:'flex',gap:10,marginBottom:'1.2rem',fontSize:'0.8rem',
            color:C.muted,flexWrap:'wrap'}}>
            {[{l:'Temas comunes',bg:C.commonBg,b:C.commonBorder},
              {l:'Temas específicos',bg:C.specBg,b:C.specBorder}].map(x=>(
              <span key={x.l} style={{display:'flex',alignItems:'center',gap:5}}>
                <span style={{width:12,height:12,borderRadius:2,background:x.bg,
                  border:`1.5px solid ${x.b}`,display:'inline-block',flexShrink:0}}/>
                {x.l}
              </span>
            ))}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:9}}>
            {PLAN_GENERIC.map((t,i)=><PlanItem key={t.num} topic={t} isMobile={isMobile} index={i}/>)}
          </div>
        </div>
      </section>

      {/* ── METODOLOGÍA ── */}
      <section id="metodologia" style={{background:'#f4f5f7',padding:`52px ${px}`}}>
        <div style={{maxWidth:1200,margin:'0 auto'}}>
          <SH eyebrow="Metodología" title="Una formación pensada para profesionales"/>
          <div style={{display:'grid',
            gridTemplateColumns:isMobile?'1fr':isTablet?'1fr 1fr':'repeat(3,1fr)',
            gap:'1rem'}}>
            {[
              {icon:'📚',title:'Base conceptual rigurosa',desc:'Los dos primeros temas garantizan una comprensión sólida de la IA antes de la especialización sectorial.'},
              {icon:'🎯',title:'Especialización sectorial',desc:'Los temas 3 y 4 se adaptan al sector elegido, con aplicaciones y casos de uso del ámbito profesional.'},
              {icon:'🔗',title:'Puerta al máster',desc:'Los microcursos actúan como primera aproximación con proyección hacia programas de máster en IA.'},
              {icon:'🌐',title:'100% online',desc:'Formación flexible para compaginar con la actividad profesional sin renunciar a la calidad académica.'},
              {icon:'👥',title:'Sin requisitos técnicos',desc:'Diseñado para públicos amplios. Enfoque aplicado y accesible, no una formación de programación.'},
              {icon:'🏅',title:'Reconocimiento académico',desc:'1 a 1,5 ECTS por microcurso, con reconocimiento oficial en el marco de la Formación Permanente de ESIT.'},
            ].map((m,i)=>(
              <div key={i} style={{background:'#fff',borderRadius:8,padding:'20px 16px',
                border:`1px solid ${C.border}`,
                animation:'fadeUp 0.4s ease both',animationDelay:`${i*0.06}s`}}>
                <div style={{width:44,height:44,borderRadius:9,background:C.navy,
                  display:'flex',alignItems:'center',justifyContent:'center',
                  marginBottom:'0.9rem',fontSize:'1.3rem'}}>{m.icon}</div>
                <h3 style={{fontFamily:'Merriweather,serif',fontSize:'0.9rem',fontWeight:700,
                  color:C.navy,marginBottom:'0.45rem'}}>{m.title}</h3>
                <p style={{fontSize:'0.83rem',color:C.muted,lineHeight:1.65}}>{m.desc}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ── CTA ── */}
      <section style={{background:`linear-gradient(110deg,${C.navy} 0%,${C.navyLight} 100%)`,
        padding:`60px ${px}`,textAlign:'center'}}>
        <h2 style={{fontFamily:'Merriweather,serif',
          fontSize:isMobile?'1.5rem':'clamp(1.5rem,3vw,2.1rem)',
          fontWeight:900,color:'#fff',marginBottom:'0.9rem',lineHeight:1.25}}>
          ¿A qué sector perteneces?<br/>
          <span style={{color:C.orange}}>Elige tu microcurso.</span>
        </h2>
        <p style={{color:'rgba(255,255,255,0.68)',fontSize:isMobile?'0.9rem':'0.97rem',
          marginBottom:'2rem',lineHeight:1.75,maxWidth:480,margin:'0 auto 2rem'}}>
          Solicita información personalizada sobre el microcurso más adecuado para tu perfil profesional.
        </p>
        <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}>
          <a href="mailto:informacion@esit.es" style={{background:C.red,color:'#fff',
            padding:'13px 26px',borderRadius:5,textDecoration:'none',fontWeight:700,
            fontSize:'0.9rem'}}>Solicitar información</a>
          <a href="#microcursos" style={{border:'2px solid rgba(255,255,255,0.28)',color:'#fff',
            padding:'13px 26px',borderRadius:5,textDecoration:'none',fontWeight:600,
            fontSize:'0.9rem'}}>Ver todos los cursos</a>
        </div>
      </section>

      {/* ── FOOTER ── */}
      <footer style={{background:'#060d1c',color:'rgba(255,255,255,0.42)',padding:`2rem ${px}`}}>
        <div style={{maxWidth:1200,margin:'0 auto'}}>
          <div style={{display:'flex',alignItems:isMobile?'flex-start':'center',
            justifyContent:'space-between',flexWrap:'wrap',gap:'1rem',
            flexDirection:isMobile?'column':'row'}}>
            <div style={{fontFamily:'Merriweather,serif',fontSize:'1rem',
              color:'rgba(255,255,255,0.8)',fontWeight:900}}>ESIT · IA Aplicada</div>
            <div style={{display:'flex',gap:'1.2rem',flexWrap:'wrap'}}>
              {['Oferta académica','Acceso estudiantes','Aviso legal','Privacidad'].map(l=>(
                <a key={l} href="#" style={{color:'rgba(255,255,255,0.42)',
                  textDecoration:'none',fontSize:'0.8rem'}}>{l}</a>
              ))}
            </div>
            <div style={{fontSize:'0.75rem'}}>© 2025 ESIT. Todos los derechos reservados.</div>
          </div>
        </div>
      </footer>

      {modal&&<CourseModal course={modal} onClose={()=>setModal(null)} isMobile={isMobile}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
